<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="envelope" id="env">

        <div class="letter">

            <div class="photo-frame">
                <img src="sujii.jpg" alt="Sujii" class="love-image">
            </div>

            <h2>💖 Love You Sujii 💖</h2>

            <p>
                You are the reason my heart smiles every day.
            </p>

            <h3>💕 Forever Yours ❤️</h3>

        </div>

        <div class="front"></div>
        <div class="flap"></div>

    </div>

    <div class="buttons">
        <button onclick="openLetter()">💌 Open</button>
        <button onclick="closeLetter()">❤️ Close</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
